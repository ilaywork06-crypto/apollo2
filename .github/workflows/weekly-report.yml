name: Weekly Report to Boss

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect git changes
        run: |
          SINCE=$(date -d '7 days ago' '+%Y-%m-%d')
          echo "TODAY=$(date '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "WEEK_START=$(date -d '7 days ago' '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$(git log --since="$SINCE" --oneline | wc -l)" >> $GITHUB_ENV

          # commits עם תיאורים
          git log --since="$SINCE" \
            --pretty=format:"[%ad] %s%n%b" \
            --date=short > /tmp/commits.txt

          # כל הקבצים שהשתנו ללא הגבלה
          git log --since="$SINCE" --pretty=format: --name-status \
            | grep -v '^$' \
            | sed 's/^A\t/נוסף: /' \
            | sed 's/^M\t/עודכן: /' \
            | sed 's/^D\t/נמחק: /' \
            | sort -u > /tmp/files.txt

          # מבנה תיקיות של הקבצים החדשים — עוזר ל-AI להבין ארכיטקטורה
          git log --since="$SINCE" --pretty=format: --name-only \
            | grep -v '^$' | sort -u > /tmp/new_files_list.txt

          COMMIT_COUNT=$(git log --since="$SINCE" --oneline | wc -l)
          if [ "$COMMIT_COUNT" -gt "0" ]; then
            # diff מורחב — 800 שורות במקום 300
            git diff HEAD~$COMMIT_COUNT HEAD -- \
              '*.js' '*.ts' '*.tsx' '*.jsx' '*.py' '*.css' '*.html' '*.json' '*.md' \
              2>/dev/null | head -800 > /tmp/diff.txt || echo "אין diff" > /tmp/diff.txt

            # תוכן קבצים חדשים שנוספו (לא רק diff) — כדי שה-AI יראה את הקוד המלא
            git log --since="$SINCE" --pretty=format: --diff-filter=A --name-only \
              | grep -v '^$' | sort -u | while read f; do
                if [[ "$f" =~ \.(js|ts|tsx|jsx|py|css|html|md)$ ]]; then
                  echo "=== קובץ חדש: $f ===" >> /tmp/new_files_content.txt
                  git show HEAD:"$f" 2>/dev/null | head -100 >> /tmp/new_files_content.txt
                  echo "" >> /tmp/new_files_content.txt
                fi
              done
          else
            echo "אין שינויים השבוע" > /tmp/diff.txt
          fi

          touch /tmp/new_files_content.txt

      - name: Generate AI summary in Hebrew
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          BOSS_NAME: ${{ secrets.BOSS_NAME }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          pip install groq --quiet

          python3 - <<'PYEOF'
          from groq import Groq
          import os, re

          commits      = open("/tmp/commits.txt").read()           or "אין commits השבוע"
          files        = open("/tmp/files.txt").read()             or "אין שינויי קבצים"
          diff         = open("/tmp/diff.txt").read()              or "אין diff זמין"
          new_files    = open("/tmp/new_files_content.txt").read() or ""

          prompt = f"""אתה עוזר שכותב מיילים בשם מפתח תוכנה לבוס שלו, בעברית מקצועית.

          כתוב דוח שבועי מפורט ומעמיק על בסיס הנתונים שיינתנו לך.

          כללי שפה חשובים:
          - הפתיחה תהיה פשוטה וטבעית — למשל "היי {os.environ['BOSS_NAME']}," או "שלום {os.environ['BOSS_NAME']},"
          - הסיום יהיה אנושי וקצר — למשל "תודה, {os.environ['YOUR_NAME']}"
          - לא להשתמש בביטויים כמו "מפתח הפרויקט", "מנהל הפרויקט", "בכבוד רב"
          - לכתוב בגוף ראשון

          לגבי התוכן — חשוב מאוד:
          - אם נוספו קבצים חדשים — זה הדבר הכי חשוב לציין! הסבר מה הם עושים, מה תפקידם במערכת,
            ומה המשמעות הארכיטקטורלית שלהם (למשל: נוסף צד לקוח, נוסף מודול חדש, נוסף API וכו')
          - עבור כל commit — הסבר מה בוצע, למה זה חשוב ומה ההשפעה שלו
          - עבור כל קובץ שהשתנה — הסבר מה בדיוק השתנה ומדוע
          - נתח אתגרים טכניים שעולים מהקוד ואיך טופלו
          - פרט סטטוס נוכחי וצעדים הבאים
          - כתוב רק דברים שיש לך בסיס לכתוב עליהם — אל תמציא

          החזר את התשובה בפורמט הבא בדיוק:

          SUBJECT: נושא המייל כאן
          ---BODY---
          גוף המייל כאן

          פרטים:
          שם המפתח: {os.environ['YOUR_NAME']}
          שם הבוס: {os.environ['BOSS_NAME']}
          תקופה: {os.environ['WEEK_START']} עד {os.environ['TODAY']}
          מספר commits: {os.environ['COMMIT_COUNT']}

          === Commits ===
          {commits[:2000]}

          === כל הקבצים שהשתנו ===
          {files[:2000]}

          === תוכן קבצים חדשים שנוספו ===
          {new_files[:3000]}

          === diff של שינויים בקבצים קיימים ===
          {diff[:3000]}
          """

          client = Groq(api_key=os.environ["GROQ_API_KEY"])
          response = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[{"role": "user", "content": prompt}],
              max_tokens=4000,
          )

          text = response.choices[0].message.content.strip()

          if "---BODY---" in text:
              parts = text.split("---BODY---", 1)
              subject_line = parts[0].strip()
              body = parts[1].strip()
              subject = re.sub(r'^SUBJECT:\s*', '', subject_line, flags=re.IGNORECASE).strip()
          else:
              lines = text.splitlines()
              subject = re.sub(r'^SUBJECT:\s*', '', lines[0], flags=re.IGNORECASE).strip()
              body = "\n".join(lines[1:]).strip()

          with open("/tmp/email_subject.txt", "w") as f:
              f.write(subject)
          with open("/tmp/email_body.txt", "w") as f:
              f.write(body)

          print("סיכום נוצר בהצלחה")
          print("נושא:", subject)
          PYEOF

      - name: Send email via Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BOSS_EMAIL: ${{ secrets.BOSS_EMAIL }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          subject = open("/tmp/email_subject.txt").read().strip()
          body    = open("/tmp/email_body.txt").read().strip()

          msg = MIMEMultipart()
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["BOSS_EMAIL"] + ", ilayatia@gmail.com"
          msg["Subject"] = subject
          msg.attach(MIMEText(body, "plain", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              server.send_message(msg)

          print("המייל נשלח בהצלחה!")
          PYEOF