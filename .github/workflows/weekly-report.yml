name: Weekly Report to Boss

on:
  schedule:
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect git changes
        run: |
          SINCE=$(date -d '7 days ago' '+%Y-%m-%d')
          echo "TODAY=$(date '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "WEEK_START=$(date -d '7 days ago' '+%d/%m/%Y')" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$(git log --since="$SINCE" --oneline | wc -l)" >> $GITHUB_ENV

          git log --since="$SINCE" \
            --pretty=format:"[%ad] %s%n%b" \
            --date=short > /tmp/commits.txt

          git log --since="$SINCE" --pretty=format: --name-status \
            | grep -v '^$' \
            | sed 's/^A\t/נוסף: /' \
            | sed 's/^M\t/עודכן: /' \
            | sed 's/^D\t/נמחק: /' \
            | sort -u | head -80 > /tmp/files.txt

          COMMIT_COUNT=$(git log --since="$SINCE" --oneline | wc -l)
          if [ "$COMMIT_COUNT" -gt "0" ]; then
            git diff HEAD~$COMMIT_COUNT HEAD -- \
              '*.js' '*.ts' '*.tsx' '*.jsx' '*.py' '*.css' '*.html' '*.json' '*.md' \
              2>/dev/null | head -300 > /tmp/diff.txt || echo "אין diff" > /tmp/diff.txt
          else
            echo "אין שינויים השבוע" > /tmp/diff.txt
          fi

      - name: Generate AI summary in Hebrew
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          BOSS_NAME: ${{ secrets.BOSS_NAME }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          pip install groq --quiet

          python3 - <<'PYEOF'
          from groq import Groq
          import os, json, re

          commits = open("/tmp/commits.txt").read() or "אין commits השבוע"
          files   = open("/tmp/files.txt").read()   or "אין שינויי קבצים"
          diff    = open("/tmp/diff.txt").read()    or "אין diff זמין"

          prompt = f"""אתה עוזר שכותב מיילים בשם מפתח תוכנה לבוס שלו, בעברית טבעית ואנושית.

          המייל צריך להישמע כאילו המפתח עצמו כתב אותו — לא רובוט, לא תבנית קורפורייט.
          שפה ישירה, חמה, אישית. בלי כותרות מפוצצות, בלי "מפתח הפרויקט" או "מנהל הפרויקט".
          פשוט {os.environ['YOUR_NAME']} כותב ל-{os.environ['BOSS_NAME']} על מה עשה השבוע.

          כתוב רק דברים שיש לך בסיס לכתוב עליהם מהנתונים — אל תמציא ואל תמלא מקום בשטויות.
          אם יש מה להסביר — תסביר לעומק ובפירוט. אם אין — אל תמתח.

          המייל יכלול:
          - פתיחה קצרה וטבעית (משפט או שניים, לא יותר)
          - מה עבדתי עליו השבוע — עם הסבר אמיתי על כל דבר משמעותי:
            מה השתנה בקוד, למה זה היה נחוץ, מה זה פותר או משפר
          - אם היו אתגרים או החלטות טכניות מעניינות — לציין אותם
          - לאן הולכים בשבוע הבא (אם ברור מהקוד)
          - סיום קצר וטבעי — בלי "בברכה, מפתח הפרויקט"
            פשוט "{os.environ['YOUR_NAME']}" או אפילו בלי חתימה פורמלית בכלל

          החזר JSON בלבד, ללא backticks, בפורמט הזה בדיוק:
          {{"subject": "נושא המייל", "body": "גוף המייל"}}
          בתוך ה-JSON השתמש ב-\\n לשורות חדשות.

          פרטים:
          שם המפתח: {os.environ['YOUR_NAME']}
          שם הבוס: {os.environ['BOSS_NAME']}
          תקופה: {os.environ['WEEK_START']} עד {os.environ['TODAY']}
          מספר commits: {os.environ['COMMIT_COUNT']}

          === Commits ===
          {commits[:3000]}

          === קבצים שהשתנו ===
          {files[:1500]}

          === תוכן השינויים בקוד (diff) ===
          {diff[:4000]}
          """

          client = Groq(api_key=os.environ["GROQ_API_KEY"])
          response = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[{"role": "user", "content": prompt}],
              max_tokens=4000,
          )

          text = response.choices[0].message.content.strip()
          text = text.replace("```json", "").replace("```", "").strip()

          text = re.sub(r'[\x00-\x08\x0b\x0c\x0e-\x1f]', '', text)

          match = re.search(r'\{.*\}', text, re.DOTALL)
          if match:
              text = match.group(0)

          data = json.loads(text)

          body = data["body"].replace("\\n", "\n")

          with open("/tmp/email_subject.txt", "w") as f:
              f.write(data["subject"])
          with open("/tmp/email_body.txt", "w") as f:
              f.write(body)

          print("סיכום נוצר בהצלחה")
          print("נושא:", data["subject"])
          PYEOF

      - name: Send email via Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BOSS_EMAIL: ${{ secrets.BOSS_EMAIL }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          subject = open("/tmp/email_subject.txt").read().strip()
          body    = open("/tmp/email_body.txt").read().strip()

          msg = MIMEMultipart()
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["BOSS_EMAIL"]
          msg["Subject"] = subject
          msg.attach(MIMEText(body, "plain", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              server.send_message(msg)

          print("המייל נשלח בהצלחה!")
          PYEOF
